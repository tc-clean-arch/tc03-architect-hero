services:

  # =========================
  # KAFKA
  # =========================
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - fase3net

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181

      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_HOST://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092

      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - fase3net


  # =========================
  # SERVIÇO EXTERNO (PROFESSOR)
  # =========================
  procpag:
    image: docker.io/erickemprobr/procpag:latest
    ports:
      - "8089:8089"
    networks:
      - fase3net

  # =========================
  # IDENTITY DATABASE
  # =========================
  identity-db:
    image: postgres:16
    environment:
      POSTGRES_DB: identitydb
      POSTGRES_USER: identity
      POSTGRES_PASSWORD: identity123
    ports:
      - "5433:5432"
    volumes:
      - identity_data:/var/lib/postgresql/data
    networks:
      - fase3net

  # =========================
  # ORDER DATABASE
  # =========================
  order-db:
    image: postgres:16
    environment:
      POSTGRES_DB: orderdb
      POSTGRES_USER: order
      POSTGRES_PASSWORD: order123
    ports:
      - "5434:5432"
    volumes:
      - order_data:/var/lib/postgresql/data
    networks:
      - fase3net

  # =========================
  # IDENTITY SERVICE
  # =========================
  identity-service:
    build:
      context: ./identity-access
      dockerfile: src/main/docker/Dockerfile.jvm
    restart: always
    depends_on:
      - identity-db
    ports:
      - "8080:8080"
    environment:
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://identity-db:5432/identitydb
      QUARKUS_DATASOURCE_USERNAME: identity
      QUARKUS_DATASOURCE_PASSWORD: identity123
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    networks:
      - fase3net

  # =========================
  # ORDER SERVICE
  # =========================
  order-service:
    build:
      context: ./order-service
      dockerfile: src/main/docker/Dockerfile.jvm
    restart: always
    depends_on:
      - order-db
      - kafka
    ports:
      - "8081:8081"
    environment:
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://order-db:5432/orderdb
      QUARKUS_DATASOURCE_USERNAME: order
      QUARKUS_DATASOURCE_PASSWORD: order123
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    networks:
      - fase3net


  # =========================
  # PAYMENT SERVICE
  # =========================
  payment-service:
    build:
      context: ./payment-service
      dockerfile: src/main/docker/Dockerfile.jvm
    restart: always
    depends_on:
      - kafka
      - procpag
    ports:
      - "8082:8082"
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      QUARKUS_REST_CLIENT_PAGAMENTO_EXTERNO_URL: http://procpag:8089
      QUARKUS_REST_CLIENT_ORDER_SERVICE_URL: http://order-service:8081
    networks:
      - fase3net


# =========================
# VOLUMES
# =========================
volumes:
  identity_data:
  order_data:

# =========================
# NETWORK
# =========================
networks:
  fase3net:
    driver: bridge
